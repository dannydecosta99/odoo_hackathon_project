<!DOCTYPE html>
<html>

<head>

<title>Products</title>

<link rel="stylesheet" href="../assets/css/style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- Sidebar -->
<div class="col-md-2">
<div id="sidebar"></div>
</div>

<!-- Main Content -->
<div class="col-md-10">

<div id="navbar"></div>

<h2 class="page-title">Products</h2>

<!-- Search -->
<input type="text" id="searchBox" class="form-control mb-3" placeholder="Search product">

<!-- Add Product -->
<a href="add-product.html" class="btn btn-primary mb-3">
Add Product
</a>

<!-- Products Table -->
<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Name</th>
<th>SKU</th>
<th>Stock</th>
</tr>

</thead>

<tbody id="productTable"></tbody>

</table>

<!-- Empty State -->
<div id="emptyState" class="text-center mt-5 d-none">

<img src="../assets/images/empty-state.png" width="150">

<p class="text-muted mt-3">
No products added yet
</p>

</div>

</div>

</div>

</div>

<!-- Layout loader -->
<script src="../assets/js/layout.js"></script>

<!-- Products logic -->
<script src="../assets/js/products.js"></script>

</body>

</html>
